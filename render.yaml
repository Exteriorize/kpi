services:
  - type: web
    name: kpi-dashboard
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements_kpi_dashboard_v2.txt
    startCommand: streamlit run app_kpi_history.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
